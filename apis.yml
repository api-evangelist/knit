aid: knit
name: Knit
description: >-
  Knit is a unified API platform for B2B products, AI agents, and MCP clients,
  providing integrations infrastructure for HR, recruitment, and collaboration
  tools. Knit manages cron jobs, rate limits, and retries out of the box for
  predictable data syncing at scale.
