naftiko: 1.0.0-alpha2
info:
  label: Knit Unified API — Employees
  description: 'Knit Unified API — Employees. 2 operations. Lead operation: List Employees. Self-contained Naftiko capability
    covering one Knit business surface.'
  tags:
  - Knit
  - Employees
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KNIT_API_KEY: KNIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-employees
    baseUri: https://api.getknit.dev/v1
    description: Knit Unified API — Employees business capability. Self-contained, no shared references.
    resources:
    - name: employees
      path: /employees
      operations:
      - name: listemployees
        method: GET
        description: List Employees
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: integration_id
          in: query
          type: string
          description: Filter by integration ID.
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
        - name: page_size
          in: query
          type: integer
          description: Number of records per page.
        - name: updated_after
          in: query
          type: string
          description: Filter employees updated after this timestamp.
    - name: employees-id
      path: /employees/{id}
      operations:
      - name: getemployee
        method: GET
        description: Get Employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.KNIT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: unified-employees-rest
    port: 8080
    description: REST adapter for Knit Unified API — Employees. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/employees
      name: employees
      description: REST surface for employees.
      operations:
      - method: GET
        name: listemployees
        description: List Employees
        call: unified-employees.listemployees
        with:
          integration_id: rest.integration_id
          page: rest.page
          page_size: rest.page_size
          updated_after: rest.updated_after
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/employees/{id}
      name: employees-id
      description: REST surface for employees-id.
      operations:
      - method: GET
        name: getemployee
        description: Get Employee
        call: unified-employees.getemployee
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-employees-mcp
    port: 9090
    transport: http
    description: MCP adapter for Knit Unified API — Employees. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-employees
      description: List Employees
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-employees.listemployees
      with:
        integration_id: tools.integration_id
        page: tools.page
        page_size: tools.page_size
        updated_after: tools.updated_after
      outputParameters:
      - type: object
        mapping: $.
    - name: get-employee
      description: Get Employee
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-employees.getemployee
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
