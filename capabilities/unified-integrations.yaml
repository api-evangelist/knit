naftiko: 1.0.0-alpha2
info:
  label: Knit Unified API — Integrations
  description: 'Knit Unified API — Integrations. 1 operations. Lead operation: List Integrations. Self-contained Naftiko capability
    covering one Knit business surface.'
  tags:
  - Knit
  - Integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KNIT_API_KEY: KNIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: unified-integrations
    baseUri: https://api.getknit.dev/v1
    description: Knit Unified API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: integrations
      path: /integrations
      operations:
      - name: listintegrations
        method: GET
        description: List Integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.KNIT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: unified-integrations-rest
    port: 8080
    description: REST adapter for Knit Unified API — Integrations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/integrations
      name: integrations
      description: REST surface for integrations.
      operations:
      - method: GET
        name: listintegrations
        description: List Integrations
        call: unified-integrations.listintegrations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: unified-integrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Knit Unified API — Integrations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-integrations
      description: List Integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: unified-integrations.listintegrations
      outputParameters:
      - type: object
        mapping: $.
